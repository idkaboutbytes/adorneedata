name = "idkaboutbytes/adorneedata"
version = "1.0.0"
description = "Adorneedata package for Roblox."
license = "MIT"
authors = ["idkaboutbytes"]
repository = "https://github.com/idkaboutbytes/adorneedata"
includes = [
    "pesde.toml",
    "README.md",
    "CHANGELOG.md",
    "default.project.json",
    "src/**/*.luau",
]

[target]
environment = "roblox"
lib = "src"
build_files = ["src"]

[dependencies]
Loader = { repo = "idkaboutbytes/loader", rev = "v1.2.1" }
AttributeUtils = { repo = "idkaboutbytes/attributeutils", rev = "v1.1.0" }
AttributeValue = { repo = "idkaboutbytes/attributevalue", rev = "v1.0.1" }
DefaultValueUtils = { repo = "idkaboutbytes/defaultvalueutils", rev = "v1.0.0" }
DuckTypeUtils = { repo = "idkaboutbytes/ducktypeutils", rev = "v1.0.1" }
Rx = { repo = "idkaboutbytes/rx", rev = "v1.0.1" }
ValueObject = { repo = "idkaboutbytes/valueobject", rev = "v1.0.2" }
